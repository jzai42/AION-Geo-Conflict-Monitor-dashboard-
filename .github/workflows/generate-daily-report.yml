name: Generate Daily AION Report

on:
  schedule:
    # 9:00 AM New York time: covers both EST/EDT, guard below keeps exact 09:00 ET.
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check New York time guard
        id: ny_guard
        run: |
          ny_hour="$(TZ=America/New_York date +%H)"
          if [ "$ny_hour" = "09" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "NY hour is 09, continue."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "NY hour is $ny_hour, skip."
          fi

      - name: Checkout
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with origin/main (avoid starting behind remote)
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: git pull --rebase origin main

      - name: Setup Node
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Generate report via OpenAI
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1
        run: node .github/scripts/generate-aion-daily.mjs

      - name: Commit and push (rebase onto latest main to avoid non-fast-forward)
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily src/data.ts
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(report): auto-generate daily AION report"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-debug
          path: reports/daily/*
          if-no-files-found: ignore
