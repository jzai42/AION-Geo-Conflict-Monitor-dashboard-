# Needs secret GEMINI_API_KEY: Repo → Settings → Secrets and variables → Actions.
# If using Environment "production" below, also add GEMINI_API_KEY under that environment.
name: Generate Daily AION Report

on:
  schedule:
    # 5:00 AM New York — two crons cover EDT (UTC 09 → NY 05) and EST (UTC 10 → NY 05).
    # The NY time guard ensures only the run whose UTC instant is actually 05:00 in America/New_York proceeds.
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

env:
  GEMINI_MODEL: gemini-2.5-pro

concurrency:
  group: generate-daily-report
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check New York time guard
        id: ny_guard
        run: |
          ny_hour="$(TZ=America/New_York date +%H)"
          if [ "$ny_hour" = "05" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "NY hour is 05 — proceeding."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "NY hour is $ny_hour — skipping."
          fi

      - name: Checkout
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Verify GEMINI_API_KEY
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::Missing GEMINI_API_KEY. Add it: Repository Settings → Secrets and variables → Actions → New repository secret (name: GEMINI_API_KEY). If this workflow uses Environment \"production\", add the same secret under Settings → Environments → production."
            exit 1
          fi

      - name: Generate report via Gemini
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: node .github/scripts/generate-aion-daily.mjs

      - name: Commit and push
        if: steps.ny_guard.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily src/data.ts src/score-history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(report): auto-generate daily AION report"
          git pull --rebase --strategy-option=theirs origin main
          git push origin HEAD:main

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-debug
          path: reports/daily/*
          if-no-files-found: ignore
